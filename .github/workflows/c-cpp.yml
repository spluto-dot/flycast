name: Flycast Libretro Windows DLL (MinGW)

on:
  workflow_dispatch:

jobs:
  build-libretro:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 (MinGW)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: git mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-toolchain mingw-w64-x86_64-SDL2 mingw-w64-x86_64-libzip mingw-w64-x86_64-zstd mingw-w64-x86_64-glu

      - name: Build Flycast Libretro (MinGW)
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBRETRO=ON \
            -DUSE_DISCORD=OFF \
            -DUSE_LIBCDIO=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=TRUE \
            -DCMAKE_INSTALL_PREFIX=artifact

          cmake --build build --config Release -j2
          
          echo "=== DLL generated ==="
          ls -la build/lib/libretro/flycast_libretro.dll || ls -la build/flycast_libretro.dll

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: flycast-libretro-x86_64-w64-mingw32
          path: build/lib/libretro/flycast_libretro.dll
